<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Rocket League Central</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="css/tailwind.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Nunito:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#07080f] min-h-screen text-white overflow-x-hidden" style="font-family:'Inter',system-ui,sans-serif">

  <!-- Background orbs -->
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="orb orb-orange w-[450px] h-[450px] -top-40 -left-40 animate-drift"></div>
    <div class="orb orb-pink w-[350px] h-[350px] bottom-0 right-0 animate-drift" style="animation-delay:-12s"></div>
  </div>
  <div class="fixed inset-0 -z-10 bg-grid-pattern opacity-[0.03]"></div>

  <!-- Navbar -->
  <nav class="fixed top-0 w-full z-50 backdrop-blur-md bg-black/40 border-b border-white/[0.06] transition-all duration-500">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="Home.html" class="flex items-center gap-3 group">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-red-500 to-orange-600 flex items-center justify-center shadow-lg shadow-red-500/20 group-hover:shadow-red-500/40 transition-shadow">
          <i class="fas fa-shield-halved text-lg"></i>
        </div>
        <span class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-white to-white/70 bg-clip-text text-transparent">Admin Panel</span>
      </a>
      <div class="flex items-center gap-3">
        <a href="Home.html" class="btn-secondary !py-2 !px-5 text-sm flex items-center gap-2">
          <i class="fas fa-home"></i> Home
        </a>
        <a href="dashboard.html" class="btn-secondary !py-2 !px-5 text-sm flex items-center gap-2">
          <i class="fas fa-th-large"></i> Dashboard
        </a>
        <button id="themeToggle" class="w-9 h-9 rounded-full glass flex items-center justify-center hover:bg-white/10 transition" title="Toggle theme">
          <i class="fas fa-sun text-sm text-amber-300" id="themeIcon"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="pt-28 pb-16">
    <div class="max-w-7xl mx-auto px-6">
      <!-- Header -->
      <div class="mb-10 slide-in">
        <div class="inline-flex items-center gap-2 badge !bg-red-500/15 !text-red-300 !border-red-500/20 mb-4">
          <i class="fas fa-shield-halved text-xs"></i> Admin only
        </div>
        <h1 class="text-4xl font-black tracking-tight">Admin Dashboard</h1>
      </div>

      <!-- Stats Grid -->
      <div id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
        <div class="stat-card rounded-2xl p-5 text-center">
          <i class="fas fa-users text-indigo-400 text-xl mb-2"></i>
          <div class="text-2xl font-black" id="statUsers">-</div>
          <div class="text-xs text-white/30 uppercase tracking-wider mt-1">Users</div>
        </div>
        <div class="stat-card rounded-2xl p-5 text-center">
          <i class="fas fa-film text-emerald-400 text-xl mb-2"></i>
          <div class="text-2xl font-black" id="statClips">-</div>
          <div class="text-xs text-white/30 uppercase tracking-wider mt-1">Clips</div>
        </div>
        <div class="stat-card rounded-2xl p-5 text-center">
          <i class="fas fa-clock text-amber-400 text-xl mb-2"></i>
          <div class="text-2xl font-black" id="statPending">-</div>
          <div class="text-xs text-white/30 uppercase tracking-wider mt-1">Pending Clips</div>
        </div>
        <div class="stat-card rounded-2xl p-5 text-center">
          <i class="fas fa-flag text-red-400 text-xl mb-2"></i>
          <div class="text-2xl font-black" id="statReports">-</div>
          <div class="text-xs text-white/30 uppercase tracking-wider mt-1">Open Reports</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex gap-2 mb-6">
        <button onclick="showTab('moderation')" id="tab-moderation" class="btn-primary !py-2 !px-5 text-sm">
          <i class="fas fa-gavel mr-1.5"></i>Moderation Queue
        </button>
        <button onclick="showTab('reports')" id="tab-reports" class="btn-secondary !py-2 !px-5 text-sm">
          <i class="fas fa-flag mr-1.5"></i>Reports
        </button>
        <button onclick="showTab('users')" id="tab-users" class="btn-secondary !py-2 !px-5 text-sm">
          <i class="fas fa-users-cog mr-1.5"></i>Users
        </button>
        <button onclick="showTab('featured')" id="tab-featured" class="btn-secondary !py-2 !px-5 text-sm">
          <i class="fas fa-star mr-1.5"></i>Featured
        </button>
      </div>

      <!-- Moderation Queue -->
      <div id="panel-moderation" class="glass-card rounded-2xl overflow-hidden">
        <div class="px-6 py-4 border-b border-white/[0.06] flex items-center gap-3">
          <i class="fas fa-gavel text-amber-400"></i>
          <h2 class="font-bold text-lg">Pending Clips</h2>
        </div>
        <div id="pendingList" class="divide-y divide-white/[0.04]">
          <p class="p-6 text-white/30 text-center">Loading...</p>
        </div>
      </div>

      <!-- Reports -->
      <div id="panel-reports" class="glass-card rounded-2xl overflow-hidden hidden">
        <div class="px-6 py-4 border-b border-white/[0.06] flex items-center gap-3">
          <i class="fas fa-flag text-red-400"></i>
          <h2 class="font-bold text-lg">Clip Reports</h2>
        </div>
        <div id="reportsList" class="divide-y divide-white/[0.04]">
          <p class="p-6 text-white/30 text-center">Loading...</p>
        </div>
      </div>

      <!-- Users -->
      <div id="panel-users" class="glass-card rounded-2xl overflow-hidden hidden">
        <div class="px-6 py-4 border-b border-white/[0.06] flex items-center gap-3">
          <i class="fas fa-users-cog text-indigo-400"></i>
          <h2 class="font-bold text-lg">User Management</h2>
        </div>
        <div id="usersList" class="divide-y divide-white/[0.04]">
          <p class="p-6 text-white/30 text-center">Loading...</p>
        </div>
      </div>

      <!-- Featured Clip Selector -->
      <div id="panel-featured" class="glass-card rounded-2xl overflow-hidden hidden">
        <div class="px-6 py-4 border-b border-white/[0.06] flex items-center gap-3">
          <i class="fas fa-star text-amber-400"></i>
          <h2 class="font-bold text-lg">Set Featured Clip</h2>
        </div>
        <div class="p-6">
          <div class="flex gap-3 mb-6">
            <input type="text" id="featuredClipId" placeholder="Paste clip ID..." class="input-field flex-1 !rounded-xl">
            <button onclick="setFeatured()" class="btn-primary !py-2.5 !px-6 !rounded-xl">
              <i class="fas fa-star mr-1.5"></i>Feature
            </button>
          </div>
          <div id="currentFeatured" class="glass rounded-xl p-4 text-sm text-white/40">No featured clip info loaded.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer py-10 mt-8">
    <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <img src="logo.png" alt="RL Central" class="w-8 h-8 rounded-lg object-cover">
        <span class="font-bold text-white/40">RL Central</span>
      </div>
      <a href="https://discord.gg/XBATAu84ZT" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-[#5865F2]/15 border border-[#5865F2]/25 text-[#5865F2] hover:bg-[#5865F2]/25 hover:border-[#5865F2]/40 transition-all duration-300 text-xs font-semibold">
        <i class="fab fa-discord"></i> Join our Discord
      </a>
      <p class="text-xs text-white/20">&copy; 2026 Rocket League Central</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script>
    let activeTab = 'moderation';

    function showTab(tab) {
      document.querySelectorAll('[id^="panel-"]').forEach(p => p.classList.add('hidden'));
      document.querySelectorAll('[id^="tab-"]').forEach(b => { b.className = b.className.replace('btn-primary', 'btn-secondary'); });
      document.getElementById('panel-' + tab).classList.remove('hidden');
      document.getElementById('tab-' + tab).className = document.getElementById('tab-' + tab).className.replace('btn-secondary', 'btn-primary');
      activeTab = tab;
    }

    async function loadStats() {
      try {
        const res = await fetch(API_BASE + '/admin/stats', { credentials: 'include' });
        if (!res.ok) { window.location.href = 'Home.html'; return; }
        const stats = await res.json();
        document.getElementById('statUsers').textContent = stats.totalUsers;
        document.getElementById('statClips').textContent = stats.totalClips;
        document.getElementById('statPending').textContent = stats.pendingClips;
        document.getElementById('statReports').textContent = stats.pendingReports;
      } catch (e) {
        window.location.href = 'Home.html';
      }
    }

    async function loadPending() {
      try {
        const res = await fetch(API_BASE + '/clips/pending', { credentials: 'include' });
        const clips = await res.json();
        if (clips.length === 0) {
          document.getElementById('pendingList').innerHTML = '<p class="p-6 text-white/30 text-center">No pending clips.</p>';
          return;
        }
        document.getElementById('pendingList').innerHTML = clips.map(c => `
          <div class="px-6 py-4 flex items-center gap-4">
            <img src="${c.thumbnailPath}" class="w-24 h-16 rounded-lg object-cover">
            <div class="flex-1 min-w-0">
              <a href="watch.html?id=${c._id}" class="font-semibold hover:text-indigo-300 transition">${c.title}</a>
              <p class="text-xs text-white/30 mt-0.5">by ${c.user?.username || 'Unknown'} &middot; ${new Date(c.createdAt).toLocaleDateString()}</p>
              ${(c.tags||[]).length ? `<div class="flex gap-1 mt-1">${c.tags.map(t=>`<span class="text-[10px] px-1.5 py-0.5 rounded-full bg-indigo-500/20 text-indigo-300">${t}</span>`).join('')}</div>` : ''}
            </div>
            <div class="flex gap-2">
              <button onclick="moderateClip('${c._id}','approve')" class="btn-primary !py-2 !px-4 text-sm !rounded-xl">
                <i class="fas fa-check mr-1"></i>Approve
              </button>
              <button onclick="moderateClip('${c._id}','reject')" class="btn-danger !py-2 !px-4 text-sm !rounded-xl">
                <i class="fas fa-times mr-1"></i>Reject
              </button>
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('pendingList').innerHTML = '<p class="p-6 text-red-400/60 text-center">Failed to load.</p>';
      }
    }

    async function moderateClip(id, action) {
      await fetch(API_BASE + '/clips/' + id + '/moderate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ action })
      });
      loadPending();
      loadStats();
    }

    async function loadReports() {
      try {
        const res = await fetch(API_BASE + '/admin/reports', { credentials: 'include' });
        const reports = await res.json();
        if (reports.length === 0) {
          document.getElementById('reportsList').innerHTML = '<p class="p-6 text-white/30 text-center">No pending reports.</p>';
          return;
        }
        document.getElementById('reportsList').innerHTML = reports.map(r => `
          <div class="px-6 py-4 flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-red-500/20 flex items-center justify-center">
              <i class="fas fa-flag text-red-400"></i>
            </div>
            <div class="flex-1 min-w-0">
              <p class="font-semibold">${r.clip?.title || 'Deleted clip'}</p>
              <p class="text-xs text-white/30 mt-0.5">Reported by ${r.user?.username || 'Unknown'}</p>
              <p class="text-sm text-white/50 mt-1">"${r.reason}"</p>
            </div>
            <div class="flex gap-2">
              <button onclick="resolveReport('${r._id}','reviewed')" class="btn-primary !py-2 !px-4 text-sm !rounded-xl">
                <i class="fas fa-check mr-1"></i>Resolve
              </button>
              <button onclick="resolveReport('${r._id}','dismissed')" class="btn-secondary !py-2 !px-4 text-sm !rounded-xl">
                <i class="fas fa-times mr-1"></i>Dismiss
              </button>
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('reportsList').innerHTML = '<p class="p-6 text-red-400/60 text-center">Failed to load.</p>';
      }
    }

    async function resolveReport(id, status) {
      await fetch(API_BASE + '/admin/reports/' + id, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ status })
      });
      loadReports();
      loadStats();
    }

    async function loadUsers() {
      try {
        const res = await fetch(API_BASE + '/admin/users', { credentials: 'include' });
        const users = await res.json();
        document.getElementById('usersList').innerHTML = users.map(u => `
          <div class="px-6 py-4 flex items-center gap-4">
            <img src="${u.avatar || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded-full ring-1 ring-white/10">
            <div class="flex-1 min-w-0">
              <span class="font-semibold">${u.displayName || u.username}</span>
              <span class="text-xs text-white/30 ml-2">@${u.username}</span>
              ${u.role === 'admin' ? '<span class="ml-2 text-[10px] px-2 py-0.5 rounded-full bg-red-500/20 text-red-300 font-semibold uppercase">Admin</span>' : ''}
            </div>
            <div class="flex items-center gap-3 text-sm text-white/40">
              <span>${(u.clips||[]).length} clips</span>
              <span>${(u.followers||[]).length} followers</span>
            </div>
            <div class="flex gap-2">
              ${u.role !== 'admin' 
                ? `<button onclick="setRole('${u._id}','admin')" class="btn-secondary !py-1.5 !px-3 text-xs !rounded-lg">Make Admin</button>` 
                : `<button onclick="setRole('${u._id}','user')" class="btn-secondary !py-1.5 !px-3 text-xs !rounded-lg">Remove Admin</button>`
              }
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('usersList').innerHTML = '<p class="p-6 text-red-400/60 text-center">Failed to load.</p>';
      }
    }

    async function setRole(userId, role) {
      await fetch(API_BASE + '/admin/users/' + userId + '/role', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ role })
      });
      loadUsers();
    }

    async function setFeatured() {
      const clipId = document.getElementById('featuredClipId').value.trim();
      if (!clipId) return;
      const res = await fetch(API_BASE + '/clips/' + clipId + '/feature', {
        method: 'POST', credentials: 'include'
      });
      if (res.ok) {
        document.getElementById('currentFeatured').innerHTML = '<span class="text-emerald-400"><i class="fas fa-check mr-1"></i>Clip featured successfully!</span>';
        document.getElementById('featuredClipId').value = '';
      } else {
        document.getElementById('currentFeatured').innerHTML = '<span class="text-red-400"><i class="fas fa-times mr-1"></i>Failed to feature clip.</span>';
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      checkAuth();
      await loadStats();
      loadPending();
      loadReports();
      loadUsers();
    });
  </script>
  <script src="js/leaderboard-bar.js"></script>
  <script src="js/settings.js"></script>
</body>
