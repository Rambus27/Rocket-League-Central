<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contests - Rocket League Central</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="css/tailwind.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#07080f] min-h-screen text-white overflow-x-hidden" style="font-family:'Inter',system-ui,sans-serif">

  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="orb orb-pink w-[400px] h-[400px] -top-40 right-0 animate-drift"></div>
    <div class="orb orb-blue w-[300px] h-[300px] bottom-0 left-1/4 animate-drift" style="animation-delay:-8s"></div>
  </div>

  <!-- Navbar -->
  <nav class="fixed top-0 w-full z-50 backdrop-blur-md bg-black/40 border-b border-white/[0.06]">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="Home.html" class="flex items-center gap-3 group">
        <img src="logo.png" alt="RL Central" class="w-10 h-10 rounded-xl shadow-lg shadow-indigo-500/20 group-hover:shadow-indigo-500/40 transition-shadow object-cover">
        <span class="text-xl font-extrabold tracking-tight bg-gradient-to-r from-white to-white/70 bg-clip-text text-transparent">RL Central</span>
      </a>
      <div class="flex items-center gap-3">
        <a href="upload.html" class="btn-primary !py-2 !px-5 text-sm flex items-center gap-2">
          <i class="fas fa-plus"></i><span class="hidden sm:inline">Upload</span>
        </a>
        <div id="userMenu" style="display:none" class="relative flex items-center gap-2 glass rounded-full px-3 py-1.5 cursor-pointer" onclick="toggleProfileDropdown(event)">
          <img id="userAvatar" class="w-8 h-8 rounded-full ring-2 ring-indigo-500/30" src="">
          <span id="username" class="font-medium text-sm hidden sm:block"></span>
          <i class="fas fa-chevron-down text-xs text-white/40 ml-1"></i>
          <div id="profileDropdown" class="hidden absolute top-full right-0 mt-2 w-52 glass-card rounded-2xl py-2 shadow-2xl z-[100] border border-white/[0.08]">
            <a href="profile.html" class="flex items-center gap-3 px-4 py-2.5 text-sm text-white/70 hover:text-white hover:bg-white/[0.06] transition-colors"><i class="fas fa-user text-indigo-400 w-5 text-center"></i> Profile</a>
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-2.5 text-sm text-white/70 hover:text-white hover:bg-white/[0.06] transition-colors"><i class="fas fa-th-large text-cyan-400 w-5 text-center"></i> Dashboard</a>
            <div class="border-t border-white/[0.06] my-1"></div>
            <a href="/auth/logout" class="flex items-center gap-3 px-4 py-2.5 text-sm text-red-400 hover:text-red-300 hover:bg-white/[0.06] transition-colors"><i class="fas fa-sign-out-alt w-5 text-center"></i> Logout</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="pt-28 pb-16 max-w-7xl mx-auto px-6">
    <div class="text-center mb-12 slide-in">
      <div class="inline-flex items-center gap-2 badge mb-6">
        <i class="fas fa-medal text-xs"></i> Contests
      </div>
      <h1 class="text-5xl font-black tracking-tight mb-4">Weekly Contests</h1>
      <p class="text-white/40 text-lg">Compete with other players for the best clip of the week</p>
    </div>

    <!-- Active Contests -->
    <div id="activeContests" class="space-y-8 mb-16">
      <div class="text-center py-16 text-white/30">Loading contests...</div>
    </div>

    <!-- Past Contests -->
    <div class="mt-16">
      <h2 class="section-heading text-2xl mb-8 flex items-center gap-3">
        <i class="fas fa-history text-white/20"></i> Past Contests
      </h2>
      <div id="pastContests" class="space-y-6">
        <p class="text-white/30 text-sm italic">No past contests yet</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer py-10 mt-8">
    <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <img src="logo.png" alt="RL Central" class="w-8 h-8 rounded-lg object-cover">
        <span class="font-bold text-white/40">RL Central</span>
      </div>
      <div class="flex flex-wrap items-center justify-center gap-4 text-sm text-white/30">
        <a href="Home.html" class="hover:text-white/60 transition-colors">Home</a>
        <a href="highlights.html" class="hover:text-white/60 transition-colors">Highlights</a>
        <a href="playlists.html" class="hover:text-white/60 transition-colors">Playlists</a>
      </div>
      <p class="text-xs text-white/20">&copy; 2026 Rocket League Central</p>
    </div>
  </footer>

  <!-- Mobile Bottom Nav -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 z-50 glass border-t border-white/[0.08] pb-safe">
    <div class="flex items-center justify-around py-2">
      <a href="Home.html" class="flex flex-col items-center gap-0.5 px-3 py-1 text-white/50"><i class="fas fa-home text-lg"></i><span class="text-[10px]">Home</span></a>
      <a href="trending.html" class="flex flex-col items-center gap-0.5 px-3 py-1 text-white/50"><i class="fas fa-fire text-lg"></i><span class="text-[10px]">Trending</span></a>
      <a href="upload.html" class="flex flex-col items-center gap-0.5 px-3 py-1"><div class="w-10 h-10 rounded-full bg-gradient-to-r from-indigo-500 to-purple-500 flex items-center justify-center -mt-4 shadow-lg shadow-indigo-500/30"><i class="fas fa-plus text-white"></i></div><span class="text-[10px] text-white/50">Upload</span></a>
      <a href="search.html" class="flex flex-col items-center gap-0.5 px-3 py-1 text-white/50"><i class="fas fa-search text-lg"></i><span class="text-[10px]">Search</span></a>
      <a href="dashboard.html" class="flex flex-col items-center gap-0.5 px-3 py-1 text-white/50"><i class="fas fa-user text-lg"></i><span class="text-[10px]">Profile</span></a>
    </div>
  </nav>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    async function loadContests() {
      try {
        const res = await fetch('/api/contests');
        const contests = await res.json();
        const active = contests.filter(c => c.status === 'active' || c.status === 'voting');
        const completed = contests.filter(c => c.status === 'completed');

        const activeContainer = document.getElementById('activeContests');
        if (!active.length) {
          activeContainer.innerHTML = '<div class="glass-card rounded-3xl p-12 text-center"><div class="w-20 h-20 rounded-2xl bg-white/[0.04] mx-auto mb-4 flex items-center justify-center"><i class="fas fa-medal text-3xl text-white/15"></i></div><p class="text-white/40 text-lg">No active contests right now</p><p class="text-white/25 text-sm mt-2">Check back soon!</p></div>';
        } else {
          activeContainer.innerHTML = active.map(c => renderContest(c)).join('');
        }

        const pastContainer = document.getElementById('pastContests');
        if (completed.length) {
          pastContainer.innerHTML = completed.map(c => `
            <div class="glass-card rounded-2xl p-6">
              <div class="flex items-center justify-between mb-3">
                <h3 class="font-bold text-lg">${c.title}</h3>
                <span class="badge !bg-white/[0.06] text-white/30">Completed</span>
              </div>
              <p class="text-sm text-white/40">Entries: ${(c.entries || []).length}</p>
              ${c.winner ? `<p class="text-sm text-yellow-400 mt-2"><i class="fas fa-trophy mr-1"></i>Winner: ${c.winner.user?.username || 'Unknown'}</p>` : ''}
            </div>
          `).join('');
        }
      } catch(e) {
        document.getElementById('activeContests').innerHTML = '<p class="text-white/30 text-center">Failed to load contests</p>';
      }
    }

    function renderContest(c) {
      const isVoting = c.status === 'voting';
      const endDate = new Date(c.endDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      return `
        <div class="glass-card rounded-3xl p-8 relative overflow-hidden">
          <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r ${isVoting ? 'from-amber-500 to-yellow-500' : 'from-rose-500 to-pink-500'}"></div>
          <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
            <div>
              <span class="badge ${isVoting ? '!bg-amber-500/20 !text-amber-300' : '!bg-rose-500/20 !text-rose-300'} mb-2 inline-block">${isVoting ? 'Voting Open' : 'Accepting Entries'}</span>
              <h2 class="text-2xl font-bold">${c.title}</h2>
              <p class="text-sm text-white/40 mt-1">Ends: ${endDate} &middot; ${(c.entries || []).length} entries</p>
            </div>
            <div class="flex gap-2">
              ${!isVoting ? `<button onclick="enterContest('${c._id}')" class="btn-primary !py-2.5 !px-6 text-sm !rounded-xl"><i class="fas fa-paper-plane mr-2"></i>Enter Contest</button>` : ''}
            </div>
          </div>
          ${(c.entries || []).length ? `
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
              ${c.entries.slice(0, 6).map(e => `
                <div class="glass rounded-xl p-3 flex gap-3">
                  <img src="${e.clip?.thumbnailPath || ''}" class="w-24 h-16 rounded-lg object-cover flex-shrink-0">
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold truncate">${e.clip?.title || 'Clip'}</p>
                    <p class="text-xs text-white/40">${e.user?.username || 'Unknown'}</p>
                    ${isVoting ? `<button onclick="voteContest('${c._id}', '${e.clip?._id}')" class="text-xs text-indigo-400 hover:text-indigo-300 mt-1"><i class="fas fa-thumbs-up mr-1"></i>Vote</button>` : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          ` : '<p class="text-white/30 text-sm">No entries yet. Be the first!</p>'}
        </div>
      `;
    }

    async function enterContest(contestId) {
      const clipId = prompt('Enter the Clip ID to submit (from your clip URL):');
      if (!clipId || !clipId.trim()) return;
      try {
        const res = await fetch(`/api/contests/${contestId}/enter`, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ clipId: clipId.trim() })
        });
        if (res.ok) {
          alert('Entry submitted!');
          loadContests();
        } else {
          const data = await res.json();
          alert(data.error || 'Failed to enter');
        }
      } catch(e) { alert('Login required'); }
    }

    async function voteContest(contestId, clipId) {
      try {
        const res = await fetch(`/api/contests/${contestId}/vote`, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ clipId })
        });
        if (res.ok) {
          alert('Vote recorded!');
          loadContests();
        } else {
          const data = await res.json();
          alert(data.error || 'Failed to vote');
        }
      } catch(e) { alert('Login required'); }
    }

    document.addEventListener('DOMContentLoaded', loadContests);
  </script>
  <script src="js/leaderboard-bar.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
