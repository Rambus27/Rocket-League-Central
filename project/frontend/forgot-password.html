<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Rocket League Central</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="css/tailwind.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#07080f] min-h-screen text-white overflow-hidden" style="font-family:'Inter',system-ui,sans-serif">

  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="orb orb-blue w-[500px] h-[500px] top-1/4 -left-40 animate-drift"></div>
    <div class="orb orb-purple w-[400px] h-[400px] bottom-1/4 -right-40 animate-drift" style="animation-delay:-8s"></div>
  </div>

  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
      <div class="glass-card rounded-3xl p-10 text-center relative overflow-hidden slide-in">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>
        <img src="logo.png" alt="RL Central" class="w-20 h-20 rounded-2xl mx-auto mb-8 shadow-lg shadow-indigo-500/25 object-cover">
        <h1 class="text-3xl font-black tracking-tight mb-3">Forgot Password</h1>
        <p class="text-white/40 text-lg mb-10 leading-relaxed">Enter your email and we'll send you a reset link</p>

        <form id="forgotForm" class="space-y-4 text-left">
          <div>
            <input type="email" id="email" required placeholder="Your email address" class="input-field !py-3 !rounded-xl !text-sm">
          </div>
          <button type="submit" class="w-full btn-primary !py-3.5 flex items-center justify-center gap-2 text-sm !rounded-xl">
            <i class="fas fa-envelope"></i> Send Reset Link
          </button>
          <p id="formMessage" class="text-xs text-center hidden"></p>
        </form>

        <div class="divider my-8"></div>
        <a href="login.html" class="btn-secondary w-full !py-3.5 flex items-center justify-center gap-2 text-sm">
          <i class="fas fa-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const msgEl = document.getElementById('formMessage');
      msgEl.classList.add('hidden');
      try {
        const res = await fetch('/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        msgEl.textContent = data.message || (res.ok ? 'Check your email for the reset link' : 'Failed to send');
        msgEl.className = `text-xs text-center ${res.ok ? 'text-green-400' : 'text-red-400'}`;
        msgEl.classList.remove('hidden');
      } catch (err) {
        msgEl.textContent = 'Network error';
        msgEl.className = 'text-xs text-center text-red-400';
        msgEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
